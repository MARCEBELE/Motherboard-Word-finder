<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Board Word Finder</title>
<style>
  :root { --bg:#0f1216; --panel:#171c23; --line:#2a323d; --txt:#e6edf3; --mut:#8b97a6; --accent:#4cc2ff; }
  * { box-sizing: border-box; }
  html,body { margin:0; height:100%; background:var(--bg); color:var(--txt);
              font-family:"Segoe UI",system-ui,sans-serif; }
  #app { display:flex; height:100vh; }
  #side { width:310px; flex:0 0 310px; background:var(--panel); border-right:1px solid var(--line);
          display:flex; flex-direction:column; }
  #head { padding:14px; border-bottom:1px solid var(--line); }
  h1 { font-size:15px; margin:0 0 10px; font-weight:600; }
  .brow { display:flex; gap:8px; margin-bottom:10px; }
  select { flex:1; min-width:0; padding:8px; border-radius:7px; border:1px solid var(--line);
           background:#0d1117; color:var(--txt); font-size:13px; }
  #q { width:100%; padding:10px 12px; font-size:16px; border-radius:8px; border:1px solid var(--line);
       background:#0d1117; color:var(--txt); outline:none; }
  #q:focus { border-color:var(--accent); }
  #stat { font-size:12px; color:var(--mut); margin-top:8px; min-height:16px; }
  #list { overflow-y:auto; flex:1; }
  .row { padding:9px 14px; border-bottom:1px solid #20262e; cursor:pointer; display:flex; gap:8px; align-items:baseline; }
  .row:hover { background:#1d242d; }
  .row.active { background:#243240; }
  .row .t { font-weight:600; font-size:14px; }
  .row .m { font-size:11px; color:var(--mut); margin-left:auto; }
  .row .src { font-size:11px; color:var(--mut); }
  #empty { padding:26px 16px; color:var(--mut); font-size:13px; line-height:1.55; }
  #main { flex:1; display:flex; flex-direction:column; min-width:0; }
  #toolbar { display:flex; gap:8px; align-items:center; padding:8px 12px; background:var(--panel);
             border-bottom:1px solid var(--line); }
  #counter { font-size:13px; color:var(--mut); min-width:60px; text-align:center; }
  .sep { flex:1; }
  #stage { flex:1; position:relative; overflow:hidden; }
  canvas { position:absolute; top:0; left:0; width:100%; height:100%; display:block; cursor:grab; }
  canvas.drag { cursor:grabbing; }
  #hint { position:absolute; top:10px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,.55);
          padding:6px 12px; border-radius:6px; font-size:12px; color:var(--mut); pointer-events:none; }
  .btn { background:#1f2630; border:1px solid var(--line); color:var(--txt); padding:7px 12px;
         border-radius:7px; cursor:pointer; font-size:13px; white-space:nowrap; }
  .btn:hover { border-color:var(--accent); }
  #addBoard { flex:0 0 auto; }
  #overlay { position:fixed; inset:0; background:rgba(0,0,0,.6); display:flex; align-items:center;
             justify-content:center; z-index:50; }
  #ocard { background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:26px 30px;
           width:380px; max-width:90vw; text-align:center; }
  #omsg { font-size:14px; margin:14px 0; line-height:1.5; }
  #ospin { width:34px; height:34px; margin:0 auto; border:3px solid var(--line);
           border-top-color:var(--accent); border-radius:50%; animation:spin 0.9s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>
<div id="app">
  <div id="side">
    <div id="head">
      <h1>Board Word Finder</h1>
      <div class="brow">
        <select id="board"></select>
        <button class="btn" id="addBoard" title="Add a new board from a folder of photos">+ Add</button>
      </div>
      <div class="brow">
        <button class="btn" id="importBoard" style="flex:1" title="Load a board someone shared with you (.zip)">Import</button>
        <button class="btn" id="exportBoard" style="flex:1" title="Save this board to a .zip file to share">Export</button>
      </div>
      <input id="q" placeholder="Type a label, e.g. PU1" autocomplete="off" spellcheck="false">
      <div id="stat"></div>
    </div>
    <div id="list"></div>
    <div id="empty" style="display:none"></div>
  </div>
  <div id="main">
    <div id="toolbar">
      <button class="btn" id="prev">&larr; Prev</button>
      <span id="counter">—</span>
      <button class="btn" id="next">Next &rarr;</button>
      <span class="sep"></span>
      <button class="btn" id="fit">Fit image</button>
      <button class="btn" id="toggleAll">Show all labels</button>
    </div>
    <div id="stage">
      <canvas id="cv"></canvas>
      <div id="hint">Scroll = zoom · Drag = pan</div>
    </div>
  </div>
</div>
<div id="overlay" style="display:none"><div id="ocard">
  <div id="ospin"></div>
  <div id="omsg"></div>
  <button class="btn" id="oclose" style="display:none">Close</button>
</div></div>
<script src="app.js"></script>
</body>
</html>
